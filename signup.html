<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tixxer — Create Account</title>
  <link rel="stylesheet" href="auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="auth-navbar">
    <a href="index.html" class="nav-logo">TIXXER</a>
    <a href="index.html" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Home
    </a>
  </nav>

  <!-- Toast container -->
  <div class="toast" id="toast"></div>

  <!-- Page layout -->
  <div class="auth-page">

    <!-- Left image panel -->
    <div class="auth-side">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=900&q=80" alt="Adventure" class="auth-side-img">
      <div class="auth-side-overlay"></div>
      <div class="auth-side-text">
        <h2>Start Your<br>Journey</h2>
        <p>One account for movies, buses, flights and railways.</p>
      </div>
    </div>

    <!-- Right form panel -->
    <div class="auth-main">
      <div class="auth-card">
        <p class="auth-label">GET STARTED</p>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join Tixxer and start booking in seconds.</p>

        <form id="signupForm" novalidate>
          <!-- Name -->
          <div class="form-group" id="nameGroup">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" autocomplete="name">
            <span class="input-glow"></span>
            <p class="error-message" id="nameError"></p>
          </div>

          <!-- Email -->
          <div class="form-group" id="emailGroup">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email">
            <span class="input-glow"></span>
            <p class="error-message" id="emailError"></p>
          </div>

          <!-- Password -->
          <div class="form-group" id="passwordGroup">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input type="password" id="password" name="password" placeholder="At least 6 characters" autocomplete="new-password">
              <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="input-glow"></span>
            <p class="error-message" id="passwordError"></p>
          </div>

          <!-- Confirm Password -->
          <div class="form-group" id="confirmGroup">
            <label for="confirmPassword">Confirm Password</label>
            <div class="password-wrapper">
              <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" autocomplete="new-password">
              <button type="button" class="password-toggle" id="toggleConfirm" aria-label="Toggle password visibility">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="input-glow"></span>
            <p class="error-message" id="confirmError"></p>
          </div>

          <button type="submit" class="auth-submit" id="signupBtn">Create Account</button>
        </form>

        <div class="auth-divider"><span>or</span></div>

        <p class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
      </div>
    </div>

  </div>

  <script src="session.js"></script>
  <script src="api.js"></script>
  <script src="auth.js"></script>
</body>
</html>
