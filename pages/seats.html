<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Seats - Tixxer</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="detail-body" id="seatsBody">

    <!--
        SEAT SELECTION PAGE (seats.html)
        =================================
        Cinema-style seat layout with rows A–F, 10 seats per row.
        Users click seats to select/deselect them.
        A live booking summary updates at the bottom.

        Layout (top to bottom):
        1. Navbar
        2. Back link
        3. Progress steps indicator
        4. Booking context bar (movie + date + time)
        5. Screen label
        6. Seat grid (6 rows x 10 seats, with center aisle)
        7. Seat legend
        8. Booking summary bar (selected seats + total + checkout button)
        9. Footer
    -->

    <!-- ========== NAVBAR ========== -->
    <nav class="navbar">
        <div class="navbar-left">
            <a href="../index.html" class="brand-link">
                <img src="../assets/images/logo.svg" alt="Tixxer" class="logo-img">
            </a>
        </div>
        <div class="navbar-center">
            <a href="../index.html" class="nav-brand-text" style="text-decoration:none;">Tixxer</a>
        </div>
        <div class="navbar-right">
            <span class="nav-network-badge">Powered by Sepolia Testnet</span>
        </div>
    </nav>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="container detail-page">

        <!-- Back Navigation (JS updates the href) -->
        <a href="movie.html?id=1" class="back-link" id="backLink">
            &larr; Back to Movie
        </a>

        <!-- Progress Steps -->
        <div class="progress-steps">
            <div class="step completed">
                <span class="step-number">1</span>
                <span class="step-label">Movie</span>
            </div>
            <div class="step-line completed"></div>
            <div class="step active">
                <span class="step-number">2</span>
                <span class="step-label">Seats</span>
            </div>
            <div class="step-line"></div>
            <div class="step">
                <span class="step-number">3</span>
                <span class="step-label">Checkout</span>
            </div>
            <div class="step-line"></div>
            <div class="step">
                <span class="step-number">4</span>
                <span class="step-label">Confirm</span>
            </div>
        </div>

        <!-- Booking Context: reminds user what they picked (populated by JS) -->
        <div class="booking-context">
            <span class="context-movie" id="contextMovie">Loading...</span>
            <span class="context-separator">&middot;</span>
            <span class="context-date" id="contextDate"></span>
            <span class="context-separator">&middot;</span>
            <span class="context-time" id="contextTime"></span>
        </div>

        <!-- ====== CINEMA SEAT MAP ====== -->
        <div class="cinema-container">

            <!-- Screen Indicator -->
            <div class="screen-wrapper">
                <div class="screen-bar"></div>
                <span class="screen-text">SCREEN</span>
            </div>

            <!-- Seat Grid: 6 rows (A–F), 10 seats each -->
            <!-- Generated by JavaScript, but the container is here -->
            <div class="seat-grid" id="seatGrid">
                <!-- JS will populate this -->
            </div>

            <!-- Seat Legend -->
            <div class="seat-legend">
                <div class="legend-item">
                    <span class="seat-demo available"></span>
                    <span>Available</span>
                </div>
                <div class="legend-item">
                    <span class="seat-demo selected"></span>
                    <span>Selected</span>
                </div>
                <div class="legend-item">
                    <span class="seat-demo booked"></span>
                    <span>Booked</span>
                </div>
            </div>

        </div>

        <!-- ====== BOOKING SUMMARY BAR ====== -->
        <div class="booking-summary" id="bookingSummary">
            <div class="summary-left">
                <div class="summary-row">
                    <span class="summary-label">Selected:</span>
                    <span class="summary-value" id="selectedSeats">None</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">Seats:</span>
                    <span class="summary-value" id="seatCount">0</span>
                    <span class="summary-divider">|</span>
                    <span class="summary-label">Total:</span>
                    <span class="summary-value summary-total" id="totalPrice">0.000 ETH</span>
                </div>
            </div>
            <a href="#" class="btn btn-primary btn-lg" id="checkoutBtn" style="pointer-events: none; opacity: 0.5;">
                Proceed to Checkout &rarr;
            </a>
        </div>

    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="footer">
        <p>&copy; 2026 Tixxer &middot; Built for Learning</p>
    </footer>

    <!-- Movie data -->
    <script src="../js/movies.js"></script>

    <!-- Populate booking context from URL params -->
    <script>
    (function () {
        var params = new URLSearchParams(window.location.search);
        var id = parseInt(params.get('id')) || 1;
        var dateStr = params.get('date') || '';   // e.g. "2026-03-12"
        var timeStr = params.get('time') || '';    // e.g. "6:00 PM"

        var movie = getMovie(id);

        // Back link — pass date/time back so movie page can restore selection
        document.getElementById('backLink').href = 'movie.html?id=' + id +
            '&date=' + encodeURIComponent(dateStr) +
            '&time=' + encodeURIComponent(timeStr);

        // Movie title
        document.getElementById('contextMovie').textContent =
            movie ? movie.title : 'Unknown Movie';

        // Format date: "2026-03-12" → "Thu, 12 Mar"
        if (dateStr) {
            var d = new Date(dateStr + 'T00:00:00');
            var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            var months = ['Jan','Feb','Mar','Apr','May','Jun',
                          'Jul','Aug','Sep','Oct','Nov','Dec'];
            var formatted = days[d.getDay()] + ', ' +
                d.getDate() + ' ' + months[d.getMonth()];
            document.getElementById('contextDate').textContent = formatted;
        }

        // Time
        document.getElementById('contextTime').textContent = timeStr;

        // Page title
        if (movie) {
            document.title = 'Select Seats - ' + movie.title + ' - Tixxer';
        }

        // Set movie backdrop as page background
        if (movie) {
            var bgUrl = movie.backdrop || movie.poster;
            document.getElementById('seatsBody').style.backgroundImage = 'url(' + bgUrl + ')';
        }

        // Make movie price available to seats.js
        window.TICKET_PRICE = movie ? parseFloat(movie.price) : 0.005;
    })();
    </script>

    <!-- Seat grid logic -->
    <script src="../js/seats.js"></script>

</body>
</html>
