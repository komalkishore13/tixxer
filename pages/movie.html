<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie - Tixxer</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="detail-body" id="detailBody">

    <!-- ========== NAVBAR ========== -->
    <nav class="navbar">
        <div class="navbar-left">
            <a href="../index.html" class="brand-link">
                <img src="../assets/images/logo.svg" alt="Tixxer" class="logo-img">
            </a>
        </div>
        <div class="navbar-center">
            <a href="../index.html" class="nav-brand-text" style="text-decoration:none;">Tixxer</a>
        </div>
        <div class="navbar-right">
            <span class="nav-network-badge">Powered by Sepolia Testnet</span>
        </div>
    </nav>

    <!-- ========== BACKDROP BANNER ========== -->
    <section class="movie-backdrop" id="movieBackdrop">
        <!-- Backdrop image set via JS -->
        <div class="backdrop-gradient"></div>
        <div class="backdrop-content">
            <!-- Back button -->
            <a href="../index.html" class="back-btn">&#8592;</a>
            <div class="backdrop-poster">
                <img src="" alt="" class="backdrop-poster-img" id="detailPoster">
            </div>
            <div class="backdrop-info">
                <h1 class="backdrop-title" id="detailTitle"></h1>

                <!-- Rating box -->
                <div class="backdrop-rating" id="detailRating"></div>

                <!-- Meta line: duration · genres · date -->
                <p class="backdrop-meta" id="detailMeta"></p>

                <!-- Language tags -->
                <div class="backdrop-tags" id="detailTags"></div>

                <!-- Ticket Price -->
                <div class="backdrop-price">
                    <span class="price-label">Ticket Price:</span>
                    <span class="price-eth" id="detailPrice"></span>
                </div>
            </div>
        </div>
    </section>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="container detail-page-content">

        <!-- About the movie -->
        <section class="about-section">
            <h2 class="about-heading">About the movie</h2>
            <p class="about-text" id="detailDesc"></p>
        </section>

        <!-- ====== SHOWTIME SELECTION ====== -->
        <section class="showtime-section">
            <h2 class="section-title">Select Showtime</h2>

            <!-- Date Selector (pills generated by JS) -->
            <div class="date-selector">
                <h3 class="selector-label">Choose Date</h3>
                <div class="date-pills" id="datePills"></div>
            </div>

            <!-- Time Slot Selector -->
            <div class="time-selector">
                <h3 class="selector-label">Choose Time</h3>
                <div class="time-pills" id="timePills">
                    <button class="time-pill" data-time="10:30 AM">10:30 AM</button>
                    <button class="time-pill" data-time="1:45 PM">1:45 PM</button>
                    <button class="time-pill" data-time="6:00 PM">6:00 PM</button>
                    <button class="time-pill" data-time="9:15 PM">9:15 PM</button>
                </div>
            </div>
        </section>

        <!-- ====== CTA: SELECT SEATS BUTTON ====== -->
        <div class="detail-cta">
            <a href="" class="btn btn-primary btn-lg" id="selectSeatsBtn2">
                Select Seats &rarr;
            </a>
        </div>

    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="footer">
        <p>&copy; 2026 Tixxer &middot; Built for Learning</p>
    </footer>

    <!-- Movie data -->
    <script src="../js/movies.js"></script>

    <!-- Populate page from movies.js + dynamic showtime logic -->
    <script>
    (function () {
        var params = new URLSearchParams(window.location.search);
        var id = parseInt(params.get('id')) || 1;
        var movie = getMovie(id);

        if (!movie) {
            document.getElementById('detailTitle').textContent = 'Movie Not Found';
            return;
        }

        /* ───────────────────────────────────────────
           SECTION 1: Populate movie details (same as before)
           ─────────────────────────────────────────── */

        document.title = movie.title + ' - Tixxer';

        var bgUrl = movie.backdrop || movie.poster;
        document.getElementById('detailBody').style.backgroundImage = 'url(' + bgUrl + ')';

        var poster = document.getElementById('detailPoster');
        poster.src = movie.poster;
        poster.alt = movie.title + ' movie poster';

        document.getElementById('detailTitle').textContent = movie.title;

        var ratingEl = document.getElementById('detailRating');
        if (movie.rating) {
            ratingEl.innerHTML =
                '<span class="rating-star">&#11088;</span> ' +
                '<span class="rating-score">' + movie.rating + '/10</span>';
        } else {
            ratingEl.innerHTML = '<span class="rating-score">Coming Soon</span>';
        }

        var metaParts = [];
        if (movie.duration && movie.duration !== 'TBA') metaParts.push(movie.duration);
        if (movie.genres && movie.genres.length) metaParts.push(movie.genres.join(', '));
        if (movie.year) metaParts.push(movie.year);
        document.getElementById('detailMeta').textContent = metaParts.join('  \u00B7  ');

        var tagsHTML = '<span class="lang-tag">' + movie.language + '</span>';
        document.getElementById('detailTags').innerHTML = tagsHTML;

        document.getElementById('detailDesc').textContent = movie.description;
        document.getElementById('detailPrice').textContent = movie.price + ' ETH';

        // --- Coming Soon: hide showtime & booking ---
        // If this movie isn't released yet, hide the showtime selector
        // and replace the CTA with a "Notify Me" message.
        if (movie.section === 'comingSoon') {
            document.querySelector('.showtime-section').style.display = 'none';
            var ctaDiv = document.querySelector('.detail-cta');
            ctaDiv.innerHTML =
                '<button class="btn btn-primary btn-lg" disabled style="opacity:0.6;cursor:not-allowed;">' +
                'Coming Soon — Not Yet Available' +
                '</button>';
            return; // Skip all the showtime/date logic below
        }

        // CTA button — build href dynamically on click so it includes
        // the latest selected date and time
        var selectSeatsBtn = document.getElementById('selectSeatsBtn2');
        selectSeatsBtn.href = 'seats.html?id=' + id;
        selectSeatsBtn.addEventListener('click', function (e) {
            e.preventDefault();
            var url = 'seats.html?id=' + id +
                '&date=' + encodeURIComponent(selectedDate || '') +
                '&time=' + encodeURIComponent(selectedTime || '');
            window.location.href = url;
        });


        /* ───────────────────────────────────────────
           SECTION 2: Dynamic Date Generation
           ───────────────────────────────────────────
           HOW IT WORKS:
           • We get today's date using `new Date()`
           • We loop 8 times (today + next 7 days)
           • For each iteration we create a new Date object
             by adding `i` days to today
           • We extract the day name (MON), date number (10),
             and month abbreviation (Mar) using arrays
           • Each button is created with these 3 labels
           • The first button (today) is auto-selected
           ─────────────────────────────────────────── */

        // Short names for days and months
        var dayNames  = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
        var monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                          'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        var today = new Date();                       // Current date & time
        var datePillsContainer = document.getElementById('datePills');

        // These variables store the user's selection
        // and will be used later on the seat booking page
        var selectedDate = null;
        var selectedTime = null;

        // Check if we have a date/time from URL (user navigated back from seats page)
        var restoreDate = params.get('date') || null;
        var restoreTime = params.get('time') || null;

        // Generate 8 date pills (today + 7 more days)
        for (var i = 0; i < 8; i++) {

            // Create a new date by copying today and adding `i` days
            // e.g. i=0 is today, i=1 is tomorrow, i=2 is day after, etc.
            var date = new Date(today);
            date.setDate(today.getDate() + i);

            // Extract parts we need for the pill display
            var dayName   = dayNames[date.getDay()];    // e.g. "MON"
            var dateNum   = date.getDate();              // e.g. 12
            var monthName = monthNames[date.getMonth()]; // e.g. "Mar"

            // Build a date string like "2026-03-12" to store as data
            var dateString = date.getFullYear() + '-' +
                String(date.getMonth() + 1).padStart(2, '0') + '-' +
                String(dateNum).padStart(2, '0');

            // Create the button element
            var btn = document.createElement('button');
            btn.className = 'date-pill';
            btn.setAttribute('data-date', dateString);  // Store full date for later use

            // Fill the button with day, date number, and month
            btn.innerHTML =
                '<span class="pill-day">' + dayName + '</span>' +
                '<span class="pill-date">' + dateNum + '</span>' +
                '<span class="pill-month">' + monthName + '</span>';

            // Auto-select: prefer restored date from URL, otherwise first pill (today)
            if (restoreDate && dateString === restoreDate) {
                btn.classList.add('active');
                selectedDate = dateString;
            } else if (!restoreDate && i === 0) {
                btn.classList.add('active');
                selectedDate = dateString;
            }

            // Add click handler for date selection
            btn.addEventListener('click', handleDateClick);

            datePillsContainer.appendChild(btn);
        }


        /* ───────────────────────────────────────────
           SECTION 3: Date Click Handler
           ───────────────────────────────────────────
           When a date pill is clicked:
           1. Remove "active" class from all date pills
           2. Add "active" to the clicked pill
           3. Update the selectedDate variable
           4. Re-check which time slots should be disabled
              (past times only matter when today is selected)
           ─────────────────────────────────────────── */

        function handleDateClick() {
            // Remove active from all date pills
            var allDatePills = datePillsContainer.querySelectorAll('.date-pill');
            for (var j = 0; j < allDatePills.length; j++) {
                allDatePills[j].classList.remove('active');
            }

            // Highlight the clicked pill
            this.classList.add('active');
            selectedDate = this.getAttribute('data-date');

            // Re-check disabled times (past showtimes only apply to today)
            updateDisabledTimes();
        }


        /* ───────────────────────────────────────────
           SECTION 4: Time Pill Click Handlers
           ───────────────────────────────────────────
           Same pattern as dates — only one time can
           be selected at a time. Disabled pills are
           ignored via CSS pointer-events: none.
           ─────────────────────────────────────────── */

        var timePillsContainer = document.getElementById('timePills');
        var allTimePills = timePillsContainer.querySelectorAll('.time-pill');

        for (var t = 0; t < allTimePills.length; t++) {
            allTimePills[t].addEventListener('click', handleTimeClick);
        }

        function handleTimeClick() {
            // Remove active from all time pills
            for (var j = 0; j < allTimePills.length; j++) {
                allTimePills[j].classList.remove('active');
            }

            // Highlight the clicked pill
            this.classList.add('active');
            selectedTime = this.getAttribute('data-time');
        }


        /* ───────────────────────────────────────────
           SECTION 5: Disable Past Showtimes
           ───────────────────────────────────────────
           HOW IT WORKS:
           • Only applies when today's date is selected
           • We convert each showtime (e.g. "1:45 PM") to
             24-hour minutes (e.g. 13*60 + 45 = 825)
           • We compare against the current time in minutes
           • If the showtime has already passed, we add the
             "disabled" class (greyed out, not clickable)
           • If a future date is selected, all times are enabled
           ─────────────────────────────────────────── */

        function updateDisabledTimes() {
            var now = new Date();

            // Build today's date string to compare
            var todayString = now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0');

            // Current time as total minutes since midnight
            // e.g. 3:00 PM = 15*60 + 0 = 900 minutes
            var currentMinutes = now.getHours() * 60 + now.getMinutes();

            var isToday = (selectedDate === todayString);

            // Track whether the currently selected time got disabled
            var selectedTimeWasDisabled = false;

            for (var i = 0; i < allTimePills.length; i++) {
                var pill = allTimePills[i];
                var timeStr = pill.getAttribute('data-time'); // e.g. "1:45 PM"

                if (isToday) {
                    // Convert "1:45 PM" to minutes since midnight
                    var showMinutes = timeToMinutes(timeStr);

                    if (showMinutes <= currentMinutes) {
                        // This showtime has passed — disable it
                        pill.classList.add('disabled');

                        // If this was the selected time, deselect it
                        if (pill.classList.contains('active')) {
                            pill.classList.remove('active');
                            selectedTime = null;
                            selectedTimeWasDisabled = true;
                        }
                    } else {
                        pill.classList.remove('disabled');
                    }
                } else {
                    // Future date — all times are available
                    pill.classList.remove('disabled');
                }
            }

            // If no time is selected, auto-select the first available one
            if (selectedTimeWasDisabled || selectedTime === null) {
                autoSelectFirstAvailableTime();
            }
        }

        /**
         * Converts a 12-hour time string to minutes since midnight.
         * Example: "1:45 PM" → split into hours=1, mins=45, period=PM
         *          → 13*60 + 45 = 825 minutes
         */
        function timeToMinutes(timeStr) {
            var parts = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
            var hours   = parseInt(parts[1]);
            var minutes = parseInt(parts[2]);
            var period  = parts[3].toUpperCase();

            // Convert to 24-hour format
            if (period === 'PM' && hours !== 12) hours += 12;
            if (period === 'AM' && hours === 12) hours = 0;

            return hours * 60 + minutes;
        }

        /**
         * Auto-selects the first non-disabled time pill.
         * Runs when the page loads or when switching to today
         * causes the previously selected time to become disabled.
         */
        function autoSelectFirstAvailableTime() {
            for (var i = 0; i < allTimePills.length; i++) {
                if (!allTimePills[i].classList.contains('disabled')) {
                    allTimePills[i].classList.add('active');
                    selectedTime = allTimePills[i].getAttribute('data-time');
                    return;
                }
            }
            // If ALL times are disabled (very late at night), no selection
            selectedTime = null;
        }

        // Run once on page load to disable past times for today
        updateDisabledTimes();

        // Restore time selection from URL if navigating back from seats page
        if (restoreTime) {
            for (var rt = 0; rt < allTimePills.length; rt++) {
                var pill = allTimePills[rt];
                if (pill.getAttribute('data-time') === restoreTime &&
                    !pill.classList.contains('disabled')) {
                    // Deselect any auto-selected time first
                    for (var rx = 0; rx < allTimePills.length; rx++) {
                        allTimePills[rx].classList.remove('active');
                    }
                    pill.classList.add('active');
                    selectedTime = restoreTime;
                    break;
                }
            }
        }

    })();
    </script>

</body>
</html>
